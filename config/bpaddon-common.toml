["Thrown Weapon Cost"]
	#The default stamina cost for thrown weapons like tridents while right click is held. Using a value of 0 will disable this integration.
	#You can override this default using a datapack and defining the thrown weapon as if it was ranged.
	#Range: 0.0 ~ 999.0
	thrown_weapon_cost = 8.0

["Wall-Jump Integration"]
	#The stamina cost for performing a wall jump. Using a value of 0 will disable this integration.
	#Range: 0.0 ~ 999.0
	wall_jump_cost = 20.0

["Combat Roll Integration"]
	#The stamina cost for performing a dodge roll. Using a value of 0 will disable this integration.
	#If you use this feature, consider lowering the cooldown in Combat Roll's server config so stamina becomes the main limiting factor.
	#Range: 0.0 ~ 999.0
	dodge_roll_cost = 30.0

