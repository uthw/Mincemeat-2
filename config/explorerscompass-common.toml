
[General]
	#Allows a player to teleport to a located structure when in creative mode, opped, or in cheat mode.
	allowTeleport = true
	#Allows players to view the precise coordinates and distance of a located structure on the HUD, rather than relying on the direction the compass is pointing.
	displayCoordinates = true
	#The maximum radius that will be searched for a structure. Raising this value will increase search accuracy but will potentially make the process more resource intensive.
	#Range: 0 ~ 1000000
	maxRadius = 25000
	#A list of structures that the compass will not display in the GUI and will not be able to search for. Wildcard character * can be used to match any number of characters, and ? can be used to match one character. Ex: ["minecraft:stronghold", "minecraft:endcity", "minecraft:*village*"]
	structureBlacklist = ["bosses_of_mass_destruction:*", "integrated_stronghold:stronghold", "repurposed_structures:stronghold*", "cataclysm:ancient_factory", "cataclysm:cursed_pyramid", "cataclysm:frosted_prison", "cataclysm:sunken_city", "irons_spellbooks:catacombs", "alexscaves:*", "skyarena:*", "netherexp:sanctum"]
	#The maximum number of samples to be taken when searching for a structure.
	#Range: 0 ~ 100000000
	maxSamples = 1000000
	#The maximum number of times a player can search for the next instance of a located structure, excluding already-found locations. Set to 0 to disable searching for additional structure instances and make the compass always locate the nearest instance.
	#Range: 0 ~ 10000
	maxNextSearches = 100
	#The default number of XP levels consumed when searching for a structure. Individual structures can be configured via perStructureXpLevels.
	#Range: 0 ~ 3
	defaultXpLevels = 0
	#A list of per-structure XP level costs that override defaultXpLevels, specified as comma-separated "structure_id,num_levels" pairs. Structures not listed here use defaultXpLevels. Max of 3 levels. The wildcard character * can be used to match any number of characters, and ? can be used to match one character. Ex: ["minecraft:buried_treasure,3", "minecraft:end*,2", "minecraft:*village*,1"]
	perStructureXpLevels = []
	#The number of successful structure searches before the compass breaks and must be repaired. Set to 0 to disable durability.
	#Range: 0 ~ 10000
	compassDurability = 0

